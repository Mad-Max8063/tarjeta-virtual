<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- SEO & Open Graph for WhatsApp -->
  <title>Tarjeta Virtual Profesional</title>
  <meta name="description" content="Compartí tu perfil profesional de forma simple y moderna">
  <meta property="og:title" content="Tarjeta Virtual Profesional">
  <meta property="og:description" content="Compartí tu perfil profesional de forma simple y moderna">
  <meta property="og:type" content="website">

  <!-- Favicon (inline SVG) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <!-- PWA redirect: if opened from home screen (/) and has a saved card, go there instantly -->
  <script>
    (function() {
      if (window.location.pathname === '/' && !window.location.search) {
        var saved = localStorage.getItem('last_card_url');
        if (saved) {
          window.location.replace(saved);
        }
      }
    })();
  </script>

  <div id="app" class="app-container"></div>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App entry point -->
  <script type="module" src="/js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>

</html>
